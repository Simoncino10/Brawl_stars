<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Tracker 🏆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Brawl Tracker 🏆</h1>
        <input type="text" id="playerTag" placeholder="Inserisci Tag (es: #V02G0V9V)">
        <button onclick="getPlayerData()">CERCA</button>

        <div id="result" style="display:none;">
            <p>Nome: <span id="playerName"></span></p>
            <p>Coppe Attuali: <span id="currentTrophies"></span></p>
            <p>Record: <span id="highestTrophies"></span></p>
            
            <hr>
            <h3>Obiettivo Coppe</h3>
            <input type="number" id="goalInput" placeholder="Inserisci obiettivo" oninput="calculateGap()">
            <p id="gapResult"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
